version: "3.9"

services:
  healthstack-backend:
    image: node:20
    working_dir: /workspace/healthstack-backend
    command: sh -lc "npm run dev"
    ports:
      - "3002:3000"
    volumes:
      - ../healthstack/HS-backend:/workspace/healthstack-backend
      - healthstack_backend_node_modules:/workspace/healthstack-backend/node_modules

  rxsoft-admin:
    image: node:20
    working_dir: /workspace/rxsoft-admin
    command: sh -lc "npm run dev -- --host 0.0.0.0"
    environment:
      VITE_SWITCH_API_BASE_URL: http://host.docker.internal:3000/api/v1
      VITE_CODING_CONCEPT_API_BASE_URL: http://host.docker.internal:3011/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ../rxsoft/rxsoft-admin:/workspace/rxsoft-admin
      - rxsoft_admin_node_modules:/workspace/rxsoft-admin/node_modules

  health-interoperability-switch:
    image: node:20
    working_dir: /workspace/health-interoperability-switch/backend
    command: sh -lc "npm run dev"
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/workspace/health-interoperability-switch/backend
      - switch_backend_node_modules:/workspace/health-interoperability-switch/backend/node_modules

  health-coding-concept:
    image: node:20
    working_dir: /workspace/health-coding-concept
    command: sh -lc "npm run dev"
    ports:
      - "3011:3011"
    volumes:
      - ./healthcare-coding-concept:/workspace/health-coding-concept
      - coding_concept_node_modules:/workspace/health-coding-concept/node_modules

volumes:
  healthstack_backend_node_modules:
  rxsoft_admin_node_modules:
  switch_backend_node_modules:
  coding_concept_node_modules:
